<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Sayang! 🖤🌹</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght=600;800&family=Montserrat:wght=400;600&family=Sacramento&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0; padding: 0;
            background: #050505;
            font-family: 'Montserrat', sans-serif;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; overflow-x: hidden; color: #ffffff;
        }

        /* --- SCREEN SCREEN PEMBUKA (COUNTDOWN & MATRIX TEXT) --- */
        #intro-screen {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: #000; z-index: 999; display: flex;
            justify-content: center; align-items: center; flex-direction: column;
        }
        #matrix-canvas {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0.35;
        }
        #countdown-text {
            font-family: 'Cinzel', serif; font-size: 80px; font-weight: 800;
            color: #ff003c; text-shadow: 0 0 20px #ff003c; z-index: 10;
            transition: all 0.3s ease;
        }
        #text-sequence {
            font-family: 'Cinzel', serif; font-size: 32px; font-weight: 800;
            color: #ffffff; text-shadow: 0 0 15px #ff003c; z-index: 10;
            text-align: center; letter-spacing: 4px; display: none;
            max-width: 90%; line-height: 1.6;
        }

        /* --- UTAMA WRAPPER --- */
        .wrapper {
            width: 100%; max-width: 420px; padding: 20px;
            text-align: center; position: relative; z-index: 10;
            display: none;
        }
        .card {
            background: rgba(15, 15, 15, 0.85); backdrop-filter: blur(12px);
            border: 2px solid #ff003c; border-radius: 30px; padding: 35px 20px;
            box-shadow: 0 0 30px rgba(255, 0, 60, 0.25);
            animation: floating 3.5s ease-in-out infinite alternate;
        }
        @keyframes floating {
            0% { transform: translateY(0px); } 100% { transform: translateY(-10px); }
        }

        /* --- DANDELION EFFECT --- */
        .flower-container {
            width: 100%; height: 130px; position: relative; margin-bottom: 5px;
        }
        .flower-text {
            font-family: 'Cinzel', serif; font-size: 16px; font-weight: 800;
            letter-spacing: 4px; color: #ffffff; text-shadow: 0 0 10px #ff003c;
        }
        .svg-flower { width: 100px; height: 100px; }
        .stem, .dande-head {
            stroke-dasharray: 500; stroke-dashoffset: 500;
            animation: grow 3s ease forwards;
        }
        .dande-head { animation-delay: 0.5s; transform-origin: 50px 45px; }
        .fluff { opacity: 0; animation: flyAway 4s linear infinite; }
        .f1 { animation-delay: 1s; } .f2 { animation-delay: 2.5s; }
        @keyframes grow { to { stroke-dashoffset: 0; } }
        @keyframes flyAway {
            0% { transform: translate(0, 0); opacity: 0; }
            5% { opacity: 1; }
            100% { transform: translate(-30px, -40px); opacity: 0; }
        }

        /* --- AMPLOP SURAT INTERAKTIF (3D FOLDING) --- */
        .envelope-wrapper {
            position: relative; width: 200px; height: 140px;
            margin: 20px auto; cursor: pointer; perspective: 1000px;
        }
        .envelope {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: #1a0206; border: 2px solid #ff003c; border-radius: 0 0 10px 10px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }
        .envelope::before {
            content: ''; position: absolute; top: 0; left: 0; width: 0; height: 0;
            border-left: 100px solid transparent; border-right: 100px solid transparent;
            border-bottom: 70px solid rgba(255, 0, 60, 0.15); z-index: 4;
        }
        .flap {
            position: absolute; top: 0; left: 0; width: 0; height: 0;
            border-left: 100px solid transparent; border-right: 100px solid transparent;
            border-top: 72px solid #ff003c; transform-origin: top;
            transition: transform 0.5s ease; z-index: 5;
        }
        .letter-preview {
            position: absolute; bottom: 10px; left: 15px; width: 170px; height: 110px;
            background: #ffffff; border-radius: 5px; z-index: 2;
            transition: transform 0.5s ease; overflow: hidden;
            display: flex; justify-content: center; align-items: center;
        }
        .letter-preview img { width: 100%; height: 100%; object-fit: cover; border-radius: 3px; }
        
        .envelope-wrapper.open .flap { transform: rotateX(180deg); z-index: 1; }
        .envelope-wrapper.open .letter-preview { transform: translateY(-60px) scale(1.1); z-index: 3; }

        /* --- ISI SURAT BERGRADASI --- */
        h1 { font-family: 'Cinzel', serif; font-size: 26px; text-shadow: 0 0 10px #ff003c; margin: 10px 0; }
        .subtitle { font-size: 11px; color: #ff4d79; margin-bottom: 20px; letter-spacing: 2px; }
        
        .letter-box {
            display: none; margin-top: 20px; padding: 20px;
            background: rgba(20, 5, 8, 0.95); border-radius: 20px;
            border-left: 5px solid #ff003c; text-align: left;
            box-shadow: 0 0 15px rgba(255, 0, 60, 0.2);
            animation: fadeIn 0.5s ease forwards;
        }
        .letter-box p { font-size: 13px; line-height: 1.6; color: #e0e0e0; margin: 0 0 10px 0; }
        .letter-box p b { color: #ff4d79; }
        .signature { text-align: right; font-family: 'Sacramento', cursive; font-size: 30px; color: #ff003c; margin-top: 15px; }

        /* --- KOLASE FOTO BENTUK HATI --- */
        #heart-collage-container {
            position: relative; width: 320px; height: 300px; margin: 30px auto 10px;
            display: none;
        }
        .collage-photo {
            position: absolute; width: 55px; height: 55px; object-fit: cover;
            border: 2px solid #ff003c; border-radius: 8px; opacity: 0;
            transform: scale(0); transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 0 10px rgba(255, 0, 60, 0.5);
        }
        .collage-photo.show { opacity: 1; transform: scale(1); }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .rose-particle { position: fixed; top: -10%; z-index: 1; pointer-events: none; animation: floatDown linear infinite; }
        @keyframes floatDown { to { transform: translateY(110vh) rotate(360deg); } }
        .footer { font-size: 9px; color: #555; margin-top: 15px; }
    </style>
</head>
